<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Poppins", sans-serif;
    background: #0f172a;
    color: #fff;
    padding: 30px;
}

.dashboard-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
}

h1 {
    font-size: 26px;
}

.controls {
    display: flex;
    gap: 10px;
}

input[type="text"] {
    padding: 8px 12px;
    border-radius: 6px;
    border: none;
    outline: none;
}

button {
    padding: 8px 14px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 500;
}

.download-btn {
    background: #22c55e;
    color: #fff;
}

.delete-btn {
    background: #ef4444;
    color: #fff;
}

.stats {
    margin-bottom: 15px;
    font-size: 14px;
    opacity: 0.8;
}

.table-container {
    overflow-x: auto;
    background: #1e293b;
    border-radius: 10px;
    padding: 15px;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
}

th, td {
    padding: 10px;
    text-align: left;
}

th {
    background: #334155;
    position: sticky;
    top: 0;
}

tr:nth-child(even) {
    background: #1f2937;
}

tr:hover {
    background: #2d3748;
}

.empty {
    text-align: center;
    padding: 20px;
    opacity: 0.6;
}
</style>
</head>

<body>

<div class="dashboard-header">
    <h1>Admin Dashboard</h1>

    <div class="controls">
        <input type="text" id="searchInput" placeholder="Search orders...">
        <a href="/download">
            <button class="download-btn">Download Excel</button>
        </a>
    </div>
</div>

<div class="stats">
    Total Orders: <span id="totalOrders">0</span>
</div>

<div class="table-container">
    <table id="table"></table>
</div>

<script>
let allData = [];

async function loadData(){
    const res = await fetch("/data");
    const data = await res.json();

    allData = data;
    document.getElementById("totalOrders").innerText = data.length;

    renderTable(data);
}

function renderTable(data){
    if(data.length === 0){
        document.getElementById("table").innerHTML =
            "<tr><td class='empty'>No orders found</td></tr>";
        return;
    }

    let html = "<tr>";

    Object.keys(data[0]).forEach(key=>{
        html += `<th>${key}</th>`;
    });

    html += "<th>Action</th></tr>";

    data.forEach(row=>{
        html += "<tr>";
        Object.values(row).forEach(val=>{
            html += `<td>${val}</td>`;
        });

        html += `
        <td>
            <button class="delete-btn" onclick="deleteRow('${row.orderId}')">
                Delete
            </button>
        </td>
        </tr>`;
    });

    document.getElementById("table").innerHTML = html;
}

async function deleteRow(orderId){
    if(!confirm("Are you sure you want to delete this order?")) return;

    await fetch(`/delete/${orderId}`, { method:"DELETE" });

    loadData();
}

document.getElementById("searchInput").addEventListener("input", function(){
    const value = this.value.toLowerCase();

    const filtered = allData.filter(row =>
        Object.values(row).some(val =>
            String(val).toLowerCase().includes(value)
        )
    );

    renderTable(filtered);
});

loadData();
</script>

</body>
</html>
